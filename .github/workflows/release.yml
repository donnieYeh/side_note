name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Validate tag matches app version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match src-tauri/tauri.conf.json ($APP_VERSION)."
            echo "Push a tag like v${APP_VERSION} after updating the app version."
            exit 1
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build executable
        run: npm run tauri:build

      - name: Prepare release asset
        shell: pwsh
        run: |
          $asset = "Side-Note-${{ github.ref_name }}-windows-x64.exe"
          Copy-Item "src-tauri/target/release/side-note.exe" $asset
          "ASSET_NAME=$asset" >> $env:GITHUB_ENV

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Side Note ${{ github.ref_name }}
          body: |
            Portable Windows executable — download and run directly, no installer required.
          generate_release_notes: true
          files: ${{ env.ASSET_NAME }}
